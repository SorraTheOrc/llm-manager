session_name: Dev
windows:
  - name: LLM
    cwd: ~/projects/llm
    panes:
      - cmd: "pi --continue"
        cwd: "~/projects/llm"
        focus: true
      - cmd: "wl tui"
        split:
          dir: vertical
          size_pct: 50
      - cmd: "clear"
        split:
          dir: horizontal
          size_pct: 30
