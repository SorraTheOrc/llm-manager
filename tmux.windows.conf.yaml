session_name: Dev
start_directory: ~/projects/llm
windows:
  - name: LLM
    panes:
      - cmd: "opencode -c"
        cwd: "~/projects/llm"
        focus: true
      - cmd: "wl tui"
        split:
          dir: vertical
          size_pct: 50
      - cmd: "clear"
        split:
          dir: horizontal
          size_pct: 30
