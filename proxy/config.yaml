default_model: gemma4
default_remote:
  api_key_env: OPENAI_API_KEY
  enabled: false
  endpoint: https://api.openai.com/v1
logging:
  directory: /var/log/llama-proxy
  level: INFO
  retention_days: 90
  rotation_hours: 6
models:
  anthropic:
    aliases:
    - claude-3-opus
    - claude-3-sonnet
    - claude-3-haiku
    - claude-*
    api_key_env: ANTHROPIC_API_KEY
    endpoint: https://api.anthropic.com/v1
    headers:
      anthropic-version: '2023-06-01'
    type: remote
  embed:
    aliases:
    - embeddings
    - embed
    llama_model: mxbai-embed
    type: local
  gemma4:
    aliases:
    - gemma4
    - Gemma4
    - Casey
    - casey
    llama_model: gemma4
    type: local
  github:
    aliases:
    - github-*
    api_key_env: GITHUB_TOKEN
    endpoint: https://models.inference.ai.azure.com
    type: remote
  gpt120:
    aliases:
    - gpt-oss-120b
    - gpt-oss*
    - GPT-OSS*
    llama_model: gpt120
    type: local
  openai:
    aliases:
    - gpt-4
    - gpt-4-turbo
    - gpt-4o
    - gpt-4o-mini
    - gpt-3.5-turbo
    - gpt-*
    - o1-*
    - chatgpt-*
    api_key_env: OPENAI_API_KEY
    endpoint: https://api.openai.com/v1
    type: remote
  qwen3:
    aliases:
    - qwen3*
    - Qwen3*
    llama_model: qwen3
    type: local
server:
  distrobox_name: llama
  embeddings_model: mxbai-embed
  host: 0.0.0.0
  llama_allow_host_fallback: true
  llama_embed_load_timeout: 30
  llama_health_check_interval: 10
  llama_model_load_timeout: 600
  llama_models_max: 2
  llama_router_mode: true
  llama_router_preload:
  - embeddings
  - gemma4
  llama_server_bin: /home/rgardler/llama.cpp/build/bin/llama-server
  llama_server_port: 8080
  llama_start_script: /home/rgardler/projects/llm/start-llama.sh
  llama_startup_timeout: 300
  port: 8000
