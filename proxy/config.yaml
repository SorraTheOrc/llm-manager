# ---------------------------------------------------------------------------
# Model Configuration
# ---------------------------------------------------------------------------
# Each model can define an ordered list of `providers` for automatic
# failover. The `providers` list replaces the old top-level `endpoint`,
# `api_key_env`, and `headers` fields on each model entry.
#
# Provider entry fields:
#   name        - Unique identifier for this provider entry
#   type        - "local" or "remote"
#   For remote: endpoint, api_key_env, headers (optional),
#               provider (optional, actual provider brand name used in
#                        X-Resolved-Model header; falls back to name)
#   For local:  llama_model
#
# Example with providers list:
#   mimo-v2.5:
#     providers:
#       - name: remote-primary
#         type: remote
#         endpoint: https://api.provider-a.com/v1
#         api_key_env: PROVIDER_A_KEY
#       - name: remote-fallback
#         type: remote
#         endpoint: https://api.provider-b.com/v1
#         api_key_env: PROVIDER_B_KEY
#     aliases:
#       - mimo*
#
# Custom system prompts per model/alias:
# Each model entry may include a `system_prompt` object to configure
# a default system prompt that is injected into requests targeting
# the model or any of its aliases.
#
#   assistant-model:
#     type: local
#     aliases: ["assistant", "asst"]
#     llama_model: gemma4
#     system_prompt:
#       mode: "prepend"   # "override" or "prepend" (required)
#       file: "proxy/prompts/assistant.txt"  # path relative to repo root
#
# Prompt resolution precedence (first match wins):
#   1) Local override:   .sorraAgents/prompts/<alias>.txt
#   2) Repo default:     <system_prompt.file> resolved against repo root
#   3) No prompt if none present
#
# See proxy/MODEL_ADD.md for the full guide.
# ---------------------------------------------------------------------------

default_model: Qwen3
# default_remote is commented out: the openai provider was removed (LP-0MQNQUR7K005GDP6).
# default_remote:
#   api_key_env: OPENAI_API_KEY
#   enabled: false
#   endpoint: https://api.openai.com/v1

# Optional named provider endpoints (e.g., Tailscale based host mapping)
providers:
  Proxy:
    host: "http://100.79.231.101:8000"
    type: local

logging:
  directory: /var/log/llama-proxy
  level: INFO
  retention_days: 90
  rotation_hours: 6

# ---------------------------------------------------------------------------
# Session Recording
# ---------------------------------------------------------------------------
# Records raw client-proxy-provider message payloads to disk for later
# debugging, auditing, and analysis. Recording is always-on and uses
# non-blocking file writes (asyncio background tasks).
#
# Fields:
#   path: Directory where recordings are stored.
#         Default: proxy/session-recordings/
session_recording:
  path: proxy/session-recordings/

# ---------------------------------------------------------------------------
# Audit model configuration
# ---------------------------------------------------------------------------
# The audit skill (skill/audit/) uses these settings to determine which
# model to call for audit operations. The resolver maps short names to
# provider-prefixed model IDs (e.g., ``deepseek-v4-flash-free`` →
# ``opencode/deepseek-v4-flash-free``).
#
# Canonical model IDs (discovered via ``pi --list-models``):
#   opencode/deepseek-v4-flash-free
#   opencode-go/deepseek-v4-flash
#   openrouter/openrouter/free
#
# See proxy/provider_resolver.py for the full mapping table.
audit_model: "deepseek-v4-flash-free"
audit_model_fallbacks:
  - "openrouter/free"
  - "deepseek-v4-flash"

models:
  embed:
    providers:
      - name: local-embed
        type: local
        llama_model: mxbai-embed
    aliases:
    - embeddings
    - embed
  gemma4:
    providers:
      - name: local-gemma4
        type: local
        llama_model: gemma4
    aliases:
    - gemma4
    - Gemma4
  github:
    providers:
      - name: github-primary
        type: remote
        provider: github
        endpoint: https://models.inference.ai.azure.com
    aliases:
    - github-*
  gpt120:
    providers:
      - name: local-gpt120
        type: local
        llama_model: gpt120
    aliases:
    - gpt-oss-120b
    - gpt-oss*
    - GPT-OSS*
    - Casey
    - casey
  qwen3:
    providers:
      - name: local-qwen3
        type: local
        llama_model: Qwen3
    aliases:
    - qwen3*
    - Qwen3*
    force_full_prompt: true

  # Cascading fallback: local Qwen3 first, then OpenCode free, OpenCode Go, then DeepSeek direct.
  # Slot exhaustion on the local model falls through to remote tiers.
  # Requires OPENCODE_API_KEY and DEEPSEEK_API_KEY env vars (or pi auth.json fallback).
  plan:
    providers:
      - name: local-qwen3
        type: local
        llama_model: Qwen3
      - name: opencode-deepseek-free
        type: remote
        provider: opencode
        endpoint: https://opencode.ai/zen
        api_key_env: OPENCODE_API_KEY
        model: deepseek-v4-flash-free
      - name: opencode-go-deepseek
        type: remote
        provider: opencode-go
        endpoint: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        model: deepseek-v4-flash
      - name: deepseek-v4-flash
        type: remote
        provider: deepseek
        endpoint: https://api.deepseek.com
        api_key_env: DEEPSEEK_API_KEY
        model: deepseek-v4-flash
    aliases:
    - plan*
    force_full_prompt: true

  qwen3-next:
    providers:
      - name: local-qwen3-next
        type: local
        llama_model: Qwen3
    aliases:
    - qwen3-next
    - qwen3-coder-next
    - qwen3-next*
    force_full_prompt: true
  code:
    providers:
      - name: local-qwen3-next
        type: local
        llama_model: Qwen3
      - name: opencode-deepseek-free
        type: remote
        provider: opencode
        endpoint: https://opencode.ai/zen
        api_key_env: OPENCODE_API_KEY
        model: deepseek-v4-flash-free
      - name: opencode-go-deepseek
        type: remote
        provider: opencode-go
        endpoint: https://opencode.ai/zen/go
        api_key_env: OPENCODE_API_KEY
        model: deepseek-v4-flash
      - name: deepseek-v4-flash
        type: remote
        provider: deepseek
        endpoint: https://api.deepseek.com
        api_key_env: DEEPSEEK_API_KEY
        model: deepseek-v4-flash
        model: deepseek-v4-flash
    aliases:
    - code
    force_full_prompt: true
server:
  embeddings_model: mxbai-embed
  host: 0.0.0.0
  # Fallback to host start is not permitted in production. This flag is
  # reserved for temporary developer troubleshooting only and must not be
  # committed in infra-managed production deployments.
  # For this environment we allow host-start so the proxy can spawn the
  # podman-backed container via the host start script wrapper.
  llama_allow_host_fallback: true
  llama_embed_load_timeout: 30
  # Router model-health monitoring cadence (seconds).
  # Preferred key (used by backend health loop):
  llama_model_health_interval_seconds: 10
  # Legacy alias retained for compatibility with older configs.
  llama_health_check_interval: 10
  # Reduce false-positive unload/reload churn under transient probe failures.
  llama_model_health_failures_before_recovery: 2
  llama_model_health_probe_attempts: 2
  llama_model_health_probe_timeout_seconds: 5
  llama_model_health_probe_backoff_seconds: 0.5
  llama_model_health_grace_period_seconds: 15
  llama_model_load_timeout: 600
  llama_models_max: 2
  llama_request_timeout: 1500
  # Provider fallback cooldown: seconds to wait before retrying a failed provider
  provider_cooldown_seconds: 60
  # Local slot-exhaustion grace retries before remote fallback.
  # Helps right-after-restart races where slot probes briefly report 0 available.
  local_slot_exhaustion_retry_attempts: 1
  local_slot_exhaustion_retry_delay_seconds: 0.1
  # Adaptive timeout: base + per_token * prompt_tokens
  llama_adaptive_timeout_enabled: true
  llama_adaptive_timeout_base_seconds: 60
  llama_adaptive_timeout_per_token_seconds: 0.015
  # Remote-specific adaptive timeout overrides (optional).
  # When set, these values are used instead of the local adaptive timeout
  # parameters for remote provider requests. Remote providers may have
  # different latency characteristics requiring shorter timeouts.
  # Falls back to the local values above when not configured.
  llama_remote_request_timeout_base_seconds: 60
  llama_remote_request_timeout_per_token_seconds: 0.015
  # Large-context fallback threshold (LP-0MRCSSBTM002NK3B).
  # When the slot cache is invalidated and estimated prompt tokens exceed this
  # value, local routing is bypassed and the request falls through to the next
  # remote provider immediately. Set to 0 to disable this behavior.
  local_large_context_fallback_threshold: 40000
  llama_router_mode: true
  max_concurrent_queries: 16
  # Local-model concurrency limit (LP-0MR5MAJNM005R905).
  # Limits concurrent requests to local providers. Remote providers
  # continue to use max_concurrent_queries. When this limit is reached,
  # requests with fallback providers skip to the next provider immediately.
  local_max_concurrent_queries: 1
  # Local dispatch lease timeout in seconds.
  # An idle session holds an inactive lease for this duration after its
  # last request completes, preventing other sessions from acquiring the
  # local backend.  The lease is released when the timeout expires,
  # allowing other sessions to use the local backend.
  #
  # local_dispatch_lease_per_token_seconds: Additional lease time (seconds)
  #   added per estimated prompt token for large-context requests, reused from
  #   llama_adaptive_timeout_per_token_seconds (0.015) if not explicitly set.
  #   This prevents mid-stream lease expiry during cache prefill.
  # local_dispatch_lease_max_seconds: Hard upper bound for the adaptive lease
  #   timeout, defaults to 1500 (same as default llama_request_timeout).
  local_dispatch_lease_timeout_seconds: 180
  session_single_flight_mode: queue
  session_single_flight_max_queue_depth: 1
  session_slot_save_path: /home/rgardler/projects/llm/slot-cache
  # Number of slots (GPU contexts) available for hash-based session slot assignment.
  # MUST match llama-server's --parallel / -np flag passed in start-llama.sh.
  # Mismatch causes slot exhaustion or restore failures:
  #   - pool_size < --parallel → some server slots go unused
  #   - pool_size > --parallel → sessions map to slot IDs that do not exist
  # The start script reads LLAMA_PARALLEL env var (set by lifecycle from this value)
  # to automatically keep them aligned.
  session_slot_pool_size: 1
  session_slot_timeout_seconds: 3.0
  slot_unavailable_retry_after: 5
  session_guardrail_max_runtime_seconds: 1800
  session_guardrail_max_completion_tokens: 2048
  session_guardrail_repetition_min_pattern_chars: 64
  session_guardrail_repetition_min_repeats: 10
  session_guardrail_invalidate_on_cutoff: true
  session_guardrail_invalidate_on_repetition: false
  # Token-rate guardrail settings (disabled by default)
  # Maximum tokens/second threshold. Set to 0 to disable token-rate guardrail.
  # Per-chunk read timeout for SSE streaming (LP-0MRB29HJ1009OR6G).
  # When the upstream stops sending data without emitting a [DONE] event
  # or closing the connection, the proxy waits this long for the next
  # chunk before synthesising a final finish_reason:stop event and ending
  # the stream.  Default: 30 seconds.
  stream_idle_timeout_seconds: 30

  # Upstream stall idle timeout (LP-0MRE52D3C001KP1H).
  # When the remote upstream stops sending data mid-stream without closing
  # the connection or sending a finish_reason, the proxy waits this long
  # for the next chunk before detecting a stall, closing the connection,
  # and retrying with bounded exponential backoff.
  # Must be shorter than the httpx read_timeout to fire before ReadTimeout.
  # Reduced from 60s to 30s for faster stall detection (LP-0MRFEXXVC001RYKB).
  # Operators with long-thinking models may increase this value.
  # Default: 30 seconds.
  upstream_idle_timeout_seconds: 30

  # Cross-request stall circuit breaker (LP-0MRFEXXVC001RYKB).
  # Tracks stall frequency per provider within a sliding time window.
  # When the stall count exceeds the threshold within the window, the
  # provider is marked unavailable for the cooldown duration, causing
  # subsequent requests to skip directly to the next provider.
  #
  # This is Tier 3 of the retry system (complementing Tier 1 per-stream
  # retries and Tier 2 provider cooldown). All keys are optional; defaults
  # apply silently when absent.
  # Sliding window duration in seconds. Stalls older than this are ignored.
  upstream_stall_window_seconds: 300
  # Stall count threshold within window before triggering cooldown.
  upstream_stall_threshold: 3
  # Cooldown duration in seconds for providers exceeding threshold.
  upstream_stall_cooldown_seconds: 180

  # Upstream retry connection timeout (LP-0MRE8FYKV008WOTB).
  # When the proxy retries a stalled upstream connection, this timeout
  # controls how long to wait for the retry connection to be established.
  # Decoupled from upstream_idle_timeout_seconds so operators can tune
  # retry connection timeouts independently (typically shorter).
  # Default: 30 seconds.
  upstream_retry_connect_timeout_seconds: 30

  # Remote HTTP client configuration (LP-0MRE8G3JK0099Y4J).
  # Controls connection pooling and timeouts for remote upstream requests.
  # The shared pool replaces per-request httpx.AsyncClient() creation.
  remote_http_client:
    # Connection-level timeout for establishing new connections.
    connect_timeout_seconds: 30
    # Read timeout for the entire response (generous to not interfere
    # with per-request adaptive timeouts).
    read_timeout_seconds: 300
    # Maximum number of connections in the pool.
    pool_connections: 50
    # Maximum number of keepalive connections to maintain.
    pool_keepalive_connections: 10
    # Time in seconds before an idle keepalive connection is closed.
    keepalive_seconds: 60

  # Upstream retry configuration (LP-0MRE8G94H005ZBLV).
  # Controls per-stream retry behavior for remote upstream connections.
  # Aligned with Pi's default retry settings (maxRetries=3, maxRetryDelayMs=60000).
  # Note: these are per-stream retries; after they exhaust, the provider-level
  # cooldown in provider.py applies separately.
  upstream_retry_max_attempts: 3
  upstream_retry_base_delay_seconds: 2.0
  upstream_retry_max_delay_seconds: 60.0

  # Heartbeat interval (in seconds) for SSE streaming.
  # During idle periods (e.g. long pre-fill on large prompts), the proxy
  # emits {"type":"heartbeat"} events every N seconds to keep the client
  # connection alive and prevent client-side timeouts.  Default: 10.
  stream_heartbeat_interval_seconds: 10
  session_guardrail_max_token_rate: 0
  # Rolling window duration in seconds for token-rate calculation.
  # The guardrail only triggers if the rate exceeds max_token_rate for the
  # entire window duration (sustained violation, not a spike).
  session_guardrail_token_rate_window_seconds: 5
  session_require_restore_signal: false
  backend_retry_attempts: 8
  backend_retry_base_delay_seconds: 0.25
  backend_retry_max_delay_seconds: 2.0
  backend_retry_jitter_ratio: 0.25
  llama_watchdog_interval_seconds: 5
  llama_backend_probe_timeout_seconds: 2
  llama_self_heal_max_attempts: 3
  llama_self_heal_window_seconds: 300
  llama_self_heal_backoff_base_seconds: 1
  llama_self_heal_retry_after_seconds: 30
  llama_router_preload:
  - embeddings
  - Qwen3
  llama_server_bin: /home/rgardler/llama.cpp/build/bin/llama-server
  llama_server_port: 8080
  llama_start_script: /home/rgardler/projects/llm/scripts/podman_start_llama.sh
  llama_startup_timeout: 300
  port: 8000

  # Slot management — job-level slot ownership (see docs/dev/slot-management-design.md)
  # Replaces per-request hash-based slot assignment with per-job ownership.
  # When enabled, each multi-turn conversation (session) owns a slot for its
  # entire lifetime, eliminating save/restore overhead between turns.
  slot_management:
    # Number of slots (GPU contexts) available for job assignment.
    # Recommended: equal to max expected concurrent sessions.
    slot_pool_size: 4
    # Maximum number of jobs waiting in the queue when all slots are busy.
    slot_queue_max_depth: 16
    # Seconds of inactivity before a job's slot is released automatically.
    slot_job_timeout_seconds: 300.0
    # Seconds in the Retry-After header when the queue is full.
    slot_queue_overflow_retry_after: 900
