[pytest]
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    refactor_parity: contract tests that guard behavior during proxy server refactor slices
    integration: tests that exercise component integration boundaries
    e2e_live: on-demand end-to-end tests against a live local proxy server
    tts_integration: tests requiring a running tts-server (skipped when unavailable)
    tts_integration: TTS integration tests requiring a running tts-server
