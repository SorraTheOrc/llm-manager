# models.ini — Single source of truth for model configuration.
#
# Quantization (from hf-repo suffix after ":") and ctx-size defined here
# are used by both router-mode and single-model startup (start-llama.sh).
# Start-llama.sh will override hardcoded defaults with these values.
#
# Format for hf-repo:
#   hf-repo = <org>/<model-name>:<quantization>
# The quantization suffix (e.g., Q5_K_M, Q8_0) is parsed automatically.

[global]
ngl = 99
ctx-size = 8192
slot-save-path = /home/rgardler/projects/llm/slot-cache

[mxbai-embed]
hf-repo = magicunicorn/mxbai-embed-large-v1-Q8_0-GGUF:Q8_0
ctx-size = 2048
embeddings = true
pooling = mean

[Qwen3]
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF:Q5_K_M
ctx-size = 131072
flash-attn = true
swa-full = true
no-mmproj = true

[Qwen3-Next]
# Qwen3 Coder Next preset (alias: qwen3-next)
# Uses the same base weights as Qwen3 but enables Jinja templating
# and other runtime flags that are useful for code generation tasks.
hf-repo = unsloth/Qwen3.6-35B-A3B-GGUF:Q5_K_M
ctx-size = 131072
flash-attn = true
swa-full = true
no-mmproj = true
jinja = true

[Qwen3-Coder-Next]
# Qwen3 Coder Next GGUF from official Qwen HF repo.
# Separate model from the unsloth-based Qwen3-Next preset.
# Preserved by cleanup scripts.
hf-repo = Qwen/Qwen3-Coder-Next-GGUF:Q5_K_M
ctx-size = 131072
flash-attn = true
jinja = true

[gemma4]
hf-repo = ggml-org/gemma-4-31B-it-GGUF:Q5_K_M
ctx-size = 131072
jinja = true

[gpt120]
hf-repo = Unsloth/gpt-oss-120b-GGUF:Q5_K_M
ctx-size = 131072
